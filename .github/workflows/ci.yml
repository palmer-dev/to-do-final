name: Pipeline CI/CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  DATABASE_URL: "postgresql://postgres:prisma@localhost:5432/postgres?schema=public"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.0.1'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  build:
    name: Build TypeScript
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.0.1'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  test:
    name: Tests
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.0.1'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test
    env:
      DATABASE_URL: "postgresql://postgres:prisma@localhost:5432/postgres?schema=public"

  security-scan:
    name: Security Scan
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0'
          severity: 'HIGH,CRITICAL'

  docker-build:
    name: Docker Build & Push
    needs: [test, build]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://postgres:prisma@localhost:5432/postgres?schema=public"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest